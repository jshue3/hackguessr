<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HackGuessr</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>

    <div class="container">
        <h1>HackGuessr</h1>
        <p>Analyze hackathon participants from DevPost</p>

        <form method="POST">
            <input 
                type="text" 
                name="hackathon_url" 
                placeholder="Enter DevPost hackathon URL..."
                required
            />
            <button type="submit">Analyze</button>
        </form>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        {% if results %}
            <div class="results">

                <div class="section">
                    <h2>Rankings</h2>
                    <ol>
                        {% for rank in results.rankings %}
                            <li>{{ rank }}</li>
                        {% endfor %}
                    </ol>
                </div>

                <div class="section">
                    <h2>Trends</h2>
                    <ul>
                        {% for trend in results.trends %}
                            <li>{{ trend }}</li>
                        {% endfor %}
                    </ul>
                </div>

            </div>
        {% endif %}

    </div>

</body>
</html>
